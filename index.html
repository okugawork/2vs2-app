<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピックル試合 - ペア作成</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="container">
    <header>
      <h1>ピックル試合</h1>
      <p>人数を選んで、ランダムな2vs2の組み合わせを作成します。</p>
    </header>

    <section class="setup">
      <div class="input-group">
        <div class="field-group">
          <label for="participantCount">人数を選択:</label>
          <select id="participantCount">
            <option value="3">3人</option>
            <option value="4" selected>4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
            <option value="7">7人</option>
            <option value="8">8人</option>
            <option value="9">9人</option>
            <option value="10">10人</option>
            <option value="11">11人</option>
            <option value="12">12人</option>
            <option value="13">13人</option>
            <option value="14">14人</option>
            <option value="15">15人</option>
            <option value="16">16人</option>
            <option value="17">17人</option>
            <option value="18">18人</option>
            <option value="19">19人</option>
            <option value="20">20人</option>
          </select>
        </div>
        <div class="field-group">
          <label for="courtCount">コート数:</label>
          <select id="courtCount">
            <option value="1" selected>1コート</option>
            <option value="2">2コート</option>
            <option value="3">3コート</option>
            <option value="4">4コート</option>
          </select>
        </div>
        <button id="createMatchesButton">ペア作成</button>
        <button id="resetButton" class="secondary-button" type="button">リセット</button>
        <div class="mid-controls">
          <div class="field-group inline-group">
            <label for="addParticipantButton">参加者追加:</label>
            <button id="addParticipantButton" type="button">参加者追加</button>
          </div>
          <div class="field-group inline-group">
            <label for="removeParticipantSelect">途中退場番号:</label>
            <select id="removeParticipantSelect"></select>
            <button id="removeParticipantButton" type="button">途中退場</button>
          </div>
        </div>
      </div>
      <p class="hint">人数とコート数に合わせて、2vs2の試合をランダムに作成できます。</p>
      <p id="modeHint" class="hint">初回のペア作成前に人数とコート数を変更できます。変更する場合は「リセット」を押してください。</p>
      <p id="pendingNotice" class="pending-notice"></p>
    </section>

    <section class="results">
      <h2>作成結果</h2>
      <p id="resultSummary" class="result-summary empty-state">まだ作成結果はありません。人数を選んで「ペア作成」を押してください。</p>
      <div id="matchList" class="match-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
